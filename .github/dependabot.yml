version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      core-deps:
        patterns: ["litellm", "instructor", "langgraph", "pydantic*"]
      dev-deps:
        patterns: ["ruff", "pytest*", "pre-commit"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
